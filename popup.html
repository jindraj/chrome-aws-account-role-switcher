<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS Role Switcher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <span class="logo">⬡</span>
        <h1>AWS Role Switcher</h1>
      </div>
      <button id="btn-options" class="icon-btn" title="Settings">⚙</button>
    </header>

    <!-- SSO Pending Auth Banner -->
    <div id="sso-banner" class="sso-banner hidden">
      <div class="sso-banner-title">SSO Login Required</div>
      <div class="sso-banner-body">
        <span>Open the browser tab that just opened and log in.</span>
        <div class="user-code" id="sso-user-code"></div>
      </div>
      <div class="sso-banner-actions">
        <button id="btn-cancel-sso" class="btn-sm btn-danger">Cancel</button>
      </div>
    </div>

    <!-- Error Banner -->
    <div id="error-banner" class="error-banner hidden">
      <span id="error-message"></span>
      <button id="btn-dismiss-error" class="icon-btn">✕</button>
    </div>

    <!-- Search -->
    <div id="search-bar">
      <input id="profile-search" type="text" placeholder="Filter profiles…" autocomplete="off" spellcheck="false">
    </div>

    <!-- Profile List -->
    <div id="profile-container">
      <div id="loading" class="loading">Loading profiles...</div>
      <div id="no-config" class="empty-state hidden">
        <p>No profiles configured.</p>
        <button id="btn-open-options" class="btn-primary">Open Settings</button>
      </div>
      <div id="profile-tree" class="hidden"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
